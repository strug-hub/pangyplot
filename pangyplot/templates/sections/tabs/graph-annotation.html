<link rel="stylesheet" href="{{ url_for('static', filename='css/ui/sections/tabs/graph-annotation.css') }}">
<div class="tab-header">{{ _('Gene Annotations') }}</div>
<hr>

<div id="gene-annotation-tab-content" class="flex-1">

    <p id="no-annotations-text">{{ _('No annotations to show') }}</p>
    <div id="gene-annotations-table-container" class="hidden">
        <table id="gene-annotations-table">
            <thead>
                <tr>
                    <th>{{ _('Gene Name') }}</th>
                    <th id="gene-annotations-exon-header">{{ _('Exons') }}</th>
                    <th></th>
                    <th>{{ _('Color') }}</th>
                </tr>
            </thead>
            <tbody id="gene-annotations-body">
                <!-- Dynamic content will be injected here -->
            </tbody>
        </table>
    </div>

    <div id="gene-annotations-control-container" class="hidden flex-1">
        <div class="flex-row">
            <button id="select-all-gene-annotations" class="button-style flex-1">
                {{ _('Show All') }}
            </button>
            <button id="deselect-all-gene-annotations" class="button-style flex-1">
                {{ _('Hide All') }}
            </button>
        </div>

        <div class="flex-row">
            <button id="set-all-colors-gene-annotations" class="button-style flex-1">
                {{ _('Set All Colors') }}
            </button>
            <input id="set-color-picker-gene-annotations" type="color" class="color-picker flex-1"> 
        </div>
    </div>

</div>
