<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Simplification Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #controls {
            padding: 10px 20px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
            z-index: 10;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        #controls span.val {
            color: #fff;
            font-weight: 600;
        }

        #stats {
            margin-left: auto;
            color: #555;
            font-size: 12px;
        }

        .lod-btn {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            width: 26px;
            height: 26px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .lod-btn:hover { background: #333; border-color: #666; }
        .lod-btn:active { background: #444; }

        #lod-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #lod-offset {
            color: #0ff;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        #canvas-container {
            flex: 1;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="controls">
        <span id="level-label" class="val">--</span>
        <span><span id="node-count" class="val">--</span> nodes</span>
        <span><span id="polyline-count" class="val">--</span> lines</span>
        <span><span id="visible-count" class="val">--</span> visible</span>
        <span><span id="reduction" class="val">--</span> reduction</span>
        <div id="lod-controls">
            <button class="lod-btn" id="lod-finer" title="Finer (more detail)">&#9664;</button>
            <span id="lod-offset">AUTO</span>
            <button class="lod-btn" id="lod-coarser" title="Coarser (less detail)">&#9654;</button>
        </div>
        <span id="viewport-bp" style="color: #4f4; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px;"></span>
        <span id="cursor-bp" style="color: #999; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px;"></span>
        <span id="stats"></span>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="loading">Loading graph data...</div>
    </div>

    <script type="module">
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const levelLabel = document.getElementById('level-label');
        const nodeCountEl = document.getElementById('node-count');
        const polylineCountEl = document.getElementById('polyline-count');
        const visibleCountEl = document.getElementById('visible-count');
        const reductionEl = document.getElementById('reduction');
        const statsEl = document.getElementById('stats');
        const loadingEl = document.getElementById('loading');
        const lodOffsetEl = document.getElementById('lod-offset');

        let data = null;
        let currentLevel = -1;

        // Manual level offset: 0 = auto, negative = finer, positive = coarser
        let levelOffset = 0;

        // Transform state
        let panX = 0, panY = 0, zoom = 1;
        let isDragging = false, dragStartX = 0, dragStartY = 0;
        let dataBounds = { minX: 0, maxX: 1, minY: 0, maxY: 1 };

        // Per-level precomputed bounding boxes: level index → Float64Array [minX,minY,maxX,maxY, ...]
        let levelBboxes = [];
        let rafId = null;

        // Reference spine: layout_x → basepair lookup
        let spineX = null;      // Float64Array
        let spineBp = null;     // Float64Array
        let chromosome = '';
        const viewportBpEl = document.getElementById('viewport-bp');
        const cursorBpEl = document.getElementById('cursor-bp');

        // ---------------------------------------------------------------
        // Setup
        // ---------------------------------------------------------------
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            if (data) scheduleFrame();
        }

        function fitToScreen() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;
            const dw = dataBounds.maxX - dataBounds.minX;
            const dh = dataBounds.maxY - dataBounds.minY;
            if (dw === 0 || dh === 0) return;
            const pad = 40;
            zoom = Math.min((cw - pad * 2) / dw, (ch - pad * 2) / dh);
            panX = (cw / 2) - ((dataBounds.minX + dw / 2) * zoom);
            panY = (ch / 2) - ((dataBounds.minY + dh / 2) * zoom);
        }

        function computeBounds() {
            // Scan all polyline endpoints across the finest level
            const level = data.levels[0];
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const pl of level.polylines) {
                for (const [x, y] of pl) {
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
            dataBounds = { minX, maxX, minY, maxY };
        }

        // ---------------------------------------------------------------
        // Precompute per-polyline bounding boxes for viewport culling
        // ---------------------------------------------------------------
        function precomputeBboxes() {
            levelBboxes = [];
            for (const level of data.levels) {
                const n = level.polylines.length;
                const arr = new Float64Array(n * 4);
                for (let i = 0; i < n; i++) {
                    const pl = level.polylines[i];
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    for (const [x, y] of pl) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                    const o = i * 4;
                    arr[o] = minX; arr[o+1] = minY; arr[o+2] = maxX; arr[o+3] = maxY;
                }
                levelBboxes.push(arr);
            }
        }

        // ---------------------------------------------------------------
        // Auto-LOD: pick grid level based on zoom
        // ---------------------------------------------------------------
        function selectLevel() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const viewportWidth = cw / zoom;
            // Target ~2000 grid cells across viewport — keeps resolution high
            const targetCell = viewportWidth / 2000;

            // Levels sorted finest → coarsest. Pick finest whose cellSize <= target.
            let best = 0;
            for (let i = data.levels.length - 1; i >= 0; i--) {
                if (data.levels[i].cellSize <= targetCell) {
                    best = i;
                    break;
                }
            }
            // Apply manual offset, clamped to valid range
            const final = Math.max(0, Math.min(data.levels.length - 1, best + levelOffset));
            return final;
        }

        // ---------------------------------------------------------------
        // Viewport bounds in data coordinates
        // ---------------------------------------------------------------
        function getViewport() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;
            return {
                minX: -panX / zoom,
                minY: -panY / zoom,
                maxX: (cw - panX) / zoom,
                maxY: (ch - panY) / zoom,
            };
        }

        // ---------------------------------------------------------------
        // Reference coordinate translation
        // ---------------------------------------------------------------
        function initSpine(refSpine) {
            const n = refSpine.length;
            spineX = new Float64Array(n);
            spineBp = new Float64Array(n);
            for (let i = 0; i < n; i++) {
                spineX[i] = refSpine[i][0];
                spineBp[i] = refSpine[i][1];
            }
        }

        function xToBp(layoutX) {
            if (!spineX || spineX.length === 0) return null;
            // Clamp to spine range
            if (layoutX <= spineX[0]) return spineBp[0];
            if (layoutX >= spineX[spineX.length - 1]) return spineBp[spineBp.length - 1];
            // Binary search for interval
            let lo = 0, hi = spineX.length - 1;
            while (lo < hi - 1) {
                const mid = (lo + hi) >> 1;
                if (spineX[mid] <= layoutX) lo = mid;
                else hi = mid;
            }
            // Linear interpolation
            const t = (layoutX - spineX[lo]) / (spineX[hi] - spineX[lo]);
            return spineBp[lo] + t * (spineBp[hi] - spineBp[lo]);
        }

        function formatBp(bp) {
            bp = Math.round(bp);
            return bp.toLocaleString();
        }

        // ---------------------------------------------------------------
        // Render: only visible polylines & junctions
        // ---------------------------------------------------------------
        function draw() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;

            ctx.clearRect(0, 0, cw, ch);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, cw, ch);

            const li = selectLevel();
            const level = data.levels[li];
            if (!level) return;

            const levelChanged = li !== currentLevel;
            currentLevel = li;

            const vp = getViewport();
            // Margin in data units so lines at the edge aren't clipped
            const margin = (level.cellSize || 50) * 2;
            const vpMinX = vp.minX - margin;
            const vpMinY = vp.minY - margin;
            const vpMaxX = vp.maxX + margin;
            const vpMaxY = vp.maxY + margin;

            ctx.save();
            ctx.translate(panX, panY);
            ctx.scale(zoom, zoom);

            // --- Polylines (culled) ---
            const lineWidth = Math.max(0.5, 1.2 / zoom);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
            ctx.lineWidth = lineWidth;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const bboxes = levelBboxes[li];
            let visiblePl = 0;

            ctx.beginPath();
            for (let i = 0; i < level.polylines.length; i++) {
                const o = i * 4;
                // Bbox check
                if (bboxes[o+2] < vpMinX || bboxes[o] > vpMaxX ||
                    bboxes[o+3] < vpMinY || bboxes[o+1] > vpMaxY) continue;

                visiblePl++;
                const pl = level.polylines[i];
                ctx.moveTo(pl[0][0], pl[0][1]);
                for (let j = 1; j < pl.length; j++) {
                    ctx.lineTo(pl[j][0], pl[j][1]);
                }
            }
            ctx.stroke();

            // --- Junctions (culled) ---
            const r = Math.max(1.5, 3.0 / zoom);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            let visibleJ = 0;

            ctx.beginPath();
            for (const [x, y] of level.junctions) {
                if (x < vpMinX || x > vpMaxX || y < vpMinY || y > vpMaxY) continue;
                visibleJ++;
                ctx.moveTo(x + r, y);
                ctx.arc(x, y, r, 0, Math.PI * 2);
            }
            ctx.fill();

            ctx.restore();

            // --- Update info ---
            if (levelChanged) {
                levelLabel.textContent = level.label;
                nodeCountEl.textContent = level.nodeCount.toLocaleString();
                polylineCountEl.textContent = level.polylineCount.toLocaleString();
                const pct = ((1 - level.nodeCount / data.stats.totalSegments) * 100).toFixed(1);
                reductionEl.textContent = `${pct}%`;
            }
            visibleCountEl.textContent = `${visiblePl.toLocaleString()} / ${visibleJ.toLocaleString()}`;

            // --- Viewport coordinate readout ---
            if (spineX) {
                const bpLeft = xToBp(vp.minX);
                const bpRight = xToBp(vp.maxX);
                if (bpLeft !== null && bpRight !== null) {
                    viewportBpEl.textContent = `${chromosome}:${formatBp(bpLeft)}-${formatBp(bpRight)}`;
                }
            }
        }

        // ---------------------------------------------------------------
        // RAF-throttled frame scheduling
        // ---------------------------------------------------------------
        function scheduleFrame() {
            if (rafId) return;
            rafId = requestAnimationFrame(() => {
                rafId = null;
                draw();
            });
        }

        // --- Pan & zoom ---
        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            dragStartX = e.clientX - panX;
            dragStartY = e.clientY - panY;
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            panX = e.clientX - dragStartX;
            panY = e.clientY - dragStartY;
            scheduleFrame();
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            const newZoom = zoom * factor;

            panX = mx - (mx - panX) * (newZoom / zoom);
            panY = my - (my - panY) * (newZoom / zoom);
            zoom = newZoom;
            scheduleFrame();
        }, { passive: false });

        // --- Cursor coordinate readout ---
        canvas.addEventListener('mousemove', e => {
            if (isDragging || !spineX) return;
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const layoutX = (screenX - panX) / zoom;
            const bp = xToBp(layoutX);
            if (bp !== null) {
                cursorBpEl.textContent = `${chromosome}:${formatBp(bp)}`;
            }
        });

        canvas.addEventListener('mouseleave', () => {
            cursorBpEl.textContent = '';
        });

        // --- Double-click to reset view ---
        canvas.addEventListener('dblclick', () => {
            fitToScreen();
            scheduleFrame();
        });

        // --- LOD override buttons ---
        document.getElementById('lod-finer').addEventListener('click', () => {
            levelOffset--;
            updateLodDisplay();
            scheduleFrame();
        });
        document.getElementById('lod-coarser').addEventListener('click', () => {
            levelOffset++;
            updateLodDisplay();
            scheduleFrame();
        });
        // Double-click offset label to reset to auto
        lodOffsetEl.addEventListener('dblclick', () => {
            levelOffset = 0;
            updateLodDisplay();
            scheduleFrame();
        });

        function updateLodDisplay() {
            if (levelOffset === 0) {
                lodOffsetEl.textContent = 'AUTO';
                lodOffsetEl.style.color = '#0ff';
            } else {
                const sign = levelOffset > 0 ? '+' : '';
                lodOffsetEl.textContent = `${sign}${levelOffset}`;
                lodOffsetEl.style.color = '#ff0';
            }
        }

        // --- Load data ---
        async function init() {
            try {
                const resp = await fetch('/simplify-data');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                data = await resp.json();
            } catch (err) {
                loadingEl.textContent = `Error loading data: ${err.message}`;
                return;
            }

            loadingEl.style.display = 'none';

            statsEl.textContent =
                `${data.stats.totalSegments.toLocaleString()} segs | ` +
                `${data.stats.junctionCount.toLocaleString()} junctions | ` +
                `${data.levels.length} grid levels`;

            precomputeBboxes();
            computeBounds();

            // Initialize reference spine if available
            if (data.refSpine) {
                initSpine(data.refSpine);
                chromosome = data.chromosome || '';
            }
            resizeCanvas();
            fitToScreen();
            scheduleFrame();
        }

        window.addEventListener('resize', resizeCanvas);
        init();
    </script>
</body>
</html>
