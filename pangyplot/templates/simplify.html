<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Simplification Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #controls {
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
            z-index: 10;
        }

        #controls label {
            font-size: 13px;
            white-space: nowrap;
        }

        #detail-slider {
            flex: 1;
            max-width: 500px;
            accent-color: #4a90d9;
            cursor: pointer;
        }

        #info {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        #info span {
            color: #fff;
            font-weight: 600;
        }

        #stats {
            margin-left: auto;
            font-size: 12px;
            color: #666;
        }

        #canvas-container {
            flex: 1;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label for="detail-slider">Detail:</label>
        <input type="range" id="detail-slider" min="0" max="10" value="5" step="1">
        <div id="info">
            <span id="level-label">--</span> &nbsp;
            <span id="node-count">--</span> nodes &nbsp;
            <span id="polyline-count">--</span> lines &nbsp;
            <span id="reduction">--</span> reduction
        </div>
        <div id="stats"></div>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="loading">Loading graph data...</div>
    </div>

    <script type="module">
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('detail-slider');
        const levelLabel = document.getElementById('level-label');
        const nodeCountEl = document.getElementById('node-count');
        const polylineCountEl = document.getElementById('polyline-count');
        const reductionEl = document.getElementById('reduction');
        const statsEl = document.getElementById('stats');
        const loadingEl = document.getElementById('loading');

        let data = null;
        let currentLevel = 0;

        // Transform state
        let panX = 0, panY = 0, zoom = 1;
        let isDragging = false, dragStartX = 0, dragStartY = 0;
        let dataBounds = { minX: 0, maxX: 1, minY: 0, maxY: 1 };

        // Offscreen rendering
        let offscreen = null;
        let offCtx = null;
        let offPanX = 0, offPanY = 0, offZoom = 1;
        let offDirty = true;
        let rafId = null;

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            // Resize offscreen to match
            offscreen = new OffscreenCanvas(canvas.width, canvas.height);
            offCtx = offscreen.getContext('2d');
            offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            offDirty = true;
            if (data) scheduleFrame();
        }

        function fitToScreen() {
            const cw = canvas.width / (window.devicePixelRatio || 1);
            const ch = canvas.height / (window.devicePixelRatio || 1);
            const dw = dataBounds.maxX - dataBounds.minX;
            const dh = dataBounds.maxY - dataBounds.minY;
            if (dw === 0 || dh === 0) return;

            const pad = 40;
            zoom = Math.min((cw - pad * 2) / dw, (ch - pad * 2) / dh);
            panX = (cw / 2) - ((dataBounds.minX + dw / 2) * zoom);
            panY = (ch / 2) - ((dataBounds.minY + dh / 2) * zoom);
            offDirty = true;
        }

        function computeBounds() {
            // Use the finest level's junctions for global bounds
            const juncs = data.levels[0].junctions;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const [x, y] of juncs) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }
            dataBounds = { minX, maxX, minY, maxY };
        }

        // ---------------------------------------------------------------
        // Offscreen rendering: draw the full graph once per level/zoom
        // ---------------------------------------------------------------
        function renderOffscreen() {
            const cw = canvas.width / (window.devicePixelRatio || 1);
            const ch = canvas.height / (window.devicePixelRatio || 1);

            offCtx.clearRect(0, 0, cw, ch);
            offCtx.fillStyle = '#000';
            offCtx.fillRect(0, 0, cw, ch);

            const level = data.levels[currentLevel];
            if (!level) return;

            offCtx.save();
            offCtx.translate(panX, panY);
            offCtx.scale(zoom, zoom);

            // Polylines
            const lineWidth = Math.max(0.5, 1.2 / zoom);
            offCtx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
            offCtx.lineWidth = lineWidth;
            offCtx.lineJoin = 'round';
            offCtx.lineCap = 'round';

            offCtx.beginPath();
            for (const pl of level.polylines) {
                offCtx.moveTo(pl[0][0], pl[0][1]);
                for (let i = 1; i < pl.length; i++) {
                    offCtx.lineTo(pl[i][0], pl[i][1]);
                }
            }
            offCtx.stroke();

            // Junction dots
            const r = Math.max(1.5, 3.0 / zoom);
            offCtx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            offCtx.beginPath();
            for (const [x, y] of level.junctions) {
                offCtx.moveTo(x + r, y);
                offCtx.arc(x, y, r, 0, Math.PI * 2);
            }
            offCtx.fill();

            offCtx.restore();

            offPanX = panX;
            offPanY = panY;
            offZoom = zoom;
            offDirty = false;
        }

        // ---------------------------------------------------------------
        // Composite: blit offscreen with pan delta, or re-render if needed
        // ---------------------------------------------------------------
        function composite() {
            const cw = canvas.width / (window.devicePixelRatio || 1);
            const ch = canvas.height / (window.devicePixelRatio || 1);

            // Re-render offscreen if zoom changed or flagged dirty
            if (offDirty || zoom !== offZoom) {
                renderOffscreen();
            }

            ctx.clearRect(0, 0, cw, ch);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, cw, ch);

            // Blit with pan offset delta
            const dx = panX - offPanX;
            const dy = panY - offPanY;
            ctx.drawImage(offscreen, dx, dy);
        }

        // ---------------------------------------------------------------
        // RAF-throttled frame scheduling
        // ---------------------------------------------------------------
        function scheduleFrame() {
            if (rafId) return;
            rafId = requestAnimationFrame(() => {
                rafId = null;
                composite();
            });
        }

        function updateInfo() {
            const level = data.levels[currentLevel];
            levelLabel.textContent = level.label;
            nodeCountEl.textContent = level.nodeCount.toLocaleString();
            polylineCountEl.textContent = level.polylineCount.toLocaleString();
            const pct = ((1 - level.nodeCount / data.stats.totalSegments) * 100).toFixed(1);
            reductionEl.textContent = `${pct}%`;
        }

        // --- Pan & zoom ---
        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            dragStartX = e.clientX - panX;
            dragStartY = e.clientY - panY;
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            panX = e.clientX - dragStartX;
            panY = e.clientY - dragStartY;
            scheduleFrame();
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            canvas.style.cursor = 'grab';
            // Re-render offscreen at final pan position to fill edges
            offDirty = true;
            scheduleFrame();
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            const newZoom = zoom * factor;

            panX = mx - (mx - panX) * (newZoom / zoom);
            panY = my - (my - panY) * (newZoom / zoom);
            zoom = newZoom;
            offDirty = true;
            scheduleFrame();
        }, { passive: false });

        // --- Slider (reversed: left = coarse, right = fine) ---
        slider.addEventListener('input', () => {
            const maxIdx = data.levels.length - 1;
            currentLevel = maxIdx - parseInt(slider.value);
            offDirty = true;
            updateInfo();
            scheduleFrame();
        });

        // --- Double-click to reset view ---
        canvas.addEventListener('dblclick', () => {
            fitToScreen();
            scheduleFrame();
        });

        // --- Load data ---
        async function init() {
            try {
                const resp = await fetch('/simplify-data');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                data = await resp.json();
            } catch (err) {
                loadingEl.textContent = `Error loading data: ${err.message}`;
                return;
            }

            loadingEl.style.display = 'none';
            canvas.style.cursor = 'grab';

            // Slider: 0 = coarsest, max = finest
            const maxIdx = data.levels.length - 1;
            slider.max = maxIdx;
            slider.value = Math.floor(maxIdx / 2);
            currentLevel = maxIdx - parseInt(slider.value);

            statsEl.textContent =
                `${data.stats.totalSegments.toLocaleString()} segs | ` +
                `${data.stats.junctionCount.toLocaleString()} junctions | ` +
                `${data.stats.runCount.toLocaleString()} runs`;

            computeBounds();
            resizeCanvas();
            fitToScreen();
            updateInfo();
            scheduleFrame();
        }

        window.addEventListener('resize', resizeCanvas);
        init();
    </script>
</body>
</html>
