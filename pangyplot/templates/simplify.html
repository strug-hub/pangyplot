<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Graph Simplification Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #controls {
            padding: 10px 20px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
            z-index: 10;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        #controls span.val {
            color: #fff;
            font-weight: 600;
        }

        #stats {
            margin-left: auto;
            color: #555;
            font-size: 12px;
        }

        .lod-btn {
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            width: 26px;
            height: 26px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .lod-btn:hover { background: #333; border-color: #666; }
        .lod-btn:active { background: #444; }

        #lod-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #lod-offset {
            color: #0ff;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        #canvas-container {
            flex: 1;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #666;
        }

        #detail-phase {
            font-size: 11px;
            font-family: 'SF Mono', Consolas, monospace;
        }
        #detail-phase.none { color: #555; }
        #detail-phase.fading { color: #f90; }
        #detail-phase.static { color: #0f0; }

        #detail-bar {
            padding: 4px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
            z-index: 10;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            color: #888;
            visibility: hidden;
        }
        #detail-bar.active { visibility: visible; }
        #detail-bar span.val { color: #5bb8f0; font-weight: 600; }

        #tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(20, 20, 20, 0.92);
            border: 1px solid #444;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 11px;
            font-family: 'SF Mono', Consolas, monospace;
            color: #ccc;
            white-space: nowrap;
            display: none;
            z-index: 20;
            line-height: 1.5;
        }
        #tooltip .tt-label { color: #888; }
        #tooltip .tt-val { color: #fff; font-weight: 600; }
        #tooltip .tt-chain { color: #5bb8f0; }
        #tooltip .tt-subtype { font-weight: 600; }
    </style>
</head>
<body>
    <div id="controls">
        <span id="level-label" class="val">--</span>
        <span><span id="node-count" class="val">--</span> nodes</span>
        <span><span id="polyline-count" class="val">--</span> lines</span>
        <span><span id="visible-count" class="val">--</span> visible</span>
        <span><span id="reduction" class="val">--</span> reduction</span>
        <div id="lod-controls">
            <button class="lod-btn" id="lod-finer" title="Finer (more detail)">&#9664;</button>
            <span id="lod-offset">AUTO</span>
            <button class="lod-btn" id="lod-coarser" title="Coarser (less detail)">&#9654;</button>
        </div>
        <span id="viewport-bp" style="color: #4f4; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px;"></span>
        <span id="cursor-bp" style="color: #999; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px;"></span>
        <span id="detail-phase" class="none"></span>
        <span id="stats"></span>
    </div>
    <div id="detail-bar">
        <span id="detail-phase2" class="none"></span>
        <span><span id="detail-chains" class="val">--</span> chains</span>
        <span><span id="detail-exposed" class="val">--</span> exposed</span>
        <span><span id="detail-nodes" class="val">--</span> bubbles</span>
        <span><span id="detail-range" class="val">--</span></span>
        <span>opacity <span id="detail-opacity" class="val">0</span></span>
        <span>steps <span id="detail-steps" class="val">--</span></span>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="loading">Loading graph data...</div>
        <div id="tooltip"></div>
    </div>

    <script src="/static/js/d3/d3.js"></script>
    <script type="module">
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const levelLabel = document.getElementById('level-label');
        const nodeCountEl = document.getElementById('node-count');
        const polylineCountEl = document.getElementById('polyline-count');
        const visibleCountEl = document.getElementById('visible-count');
        const reductionEl = document.getElementById('reduction');
        const statsEl = document.getElementById('stats');
        const loadingEl = document.getElementById('loading');
        const lodOffsetEl = document.getElementById('lod-offset');
        const detailPhaseEl = document.getElementById('detail-phase');
        const detailBarEl = document.getElementById('detail-bar');
        const detailPhase2El = document.getElementById('detail-phase2');
        const detailChainsEl = document.getElementById('detail-chains');
        const detailExposedEl = document.getElementById('detail-exposed');
        const detailNodesEl = document.getElementById('detail-nodes');
        const detailRangeEl = document.getElementById('detail-range');
        const detailOpacityEl = document.getElementById('detail-opacity');
        const detailStepsEl = document.getElementById('detail-steps');

        // Config passed from Flask
        const GENOME = '{{ genome }}';

        let data = null;
        let currentLevel = -1;

        // Manual level offset: 0 = auto, negative = finer, positive = coarser
        let levelOffset = 0;

        // Transform state
        let panX = 0, panY = 0, zoom = 1;
        let isDragging = false, dragStartX = 0, dragStartY = 0;
        let dataBounds = { minX: 0, maxX: 1, minY: 0, maxY: 1 };

        // Per-level precomputed bounding boxes: level index -> Float64Array [minX,minY,maxX,maxY, ...]
        let levelBboxes = [];
        let rafId = null;

        // Reference spine: layout_x -> basepair + step lookup
        let spineX = null;      // Float64Array
        let spineBp = null;     // Float64Array
        let spineY = null;      // Float64Array
        let spineStep = null;   // Float64Array
        let chromosome = '';
        const viewportBpEl = document.getElementById('viewport-bp');
        const cursorBpEl = document.getElementById('cursor-bp');

        // ---------------------------------------------------------------
        // Progressive detail state
        // ---------------------------------------------------------------
        const NODE_BUDGET_STEPS = 1500;
        const FETCH_MARGIN = 0.2;       // 20% extra on each side
        const FADE_DURATION = 600;      // ms for fade-in / fade-out animation

        let hashTimer = null;           // debounce timer for URL hash updates

        let detailPhase = 'none';       // 'none' | 'fading-in' | 'static' | 'fading-out'
        let detailData = null;          // { chains, totalBubbles }
        let detailCache = null;         // { bpStart, bpEnd, data }
        let detailOpacity = 0;
        let skeletonOpacity = 1;
        let fadeStartTime = 0;          // performance.now() when fade started
        let fetchController = null;     // AbortController for in-flight fetch
        let fetchTimer = null;          // debounce timer

        // ---------------------------------------------------------------
        // Setup
        // ---------------------------------------------------------------
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            if (data) scheduleFrame();
        }

        function fitToScreen() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;
            const dw = dataBounds.maxX - dataBounds.minX;
            const dh = dataBounds.maxY - dataBounds.minY;
            if (dw === 0 || dh === 0) return;
            const pad = 40;
            zoom = Math.min((cw - pad * 2) / dw, (ch - pad * 2) / dh);
            panX = (cw / 2) - ((dataBounds.minX + dw / 2) * zoom);
            panY = (ch / 2) - ((dataBounds.minY + dh / 2) * zoom);
        }

        function computeBounds() {
            // Scan all polyline endpoints across the finest level
            const level = data.levels[0];
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const pl of level.polylines) {
                for (const [x, y] of pl) {
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
            dataBounds = { minX, maxX, minY, maxY };
        }

        // ---------------------------------------------------------------
        // Precompute per-polyline bounding boxes for viewport culling
        // ---------------------------------------------------------------
        function precomputeBboxes() {
            levelBboxes = [];
            for (const level of data.levels) {
                const n = level.polylines.length;
                const arr = new Float64Array(n * 4);
                for (let i = 0; i < n; i++) {
                    const pl = level.polylines[i];
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    for (const [x, y] of pl) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                    const o = i * 4;
                    arr[o] = minX; arr[o+1] = minY; arr[o+2] = maxX; arr[o+3] = maxY;
                }
                levelBboxes.push(arr);
            }
        }

        // ---------------------------------------------------------------
        // Auto-LOD: pick grid level based on zoom
        // ---------------------------------------------------------------
        function selectLevel() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const viewportWidth = cw / zoom;
            // Target ~2000 grid cells across viewport -- keeps resolution high
            const targetCell = viewportWidth / 2000;

            // Levels sorted finest -> coarsest. Pick finest whose cellSize <= target.
            let best = 0;
            for (let i = data.levels.length - 1; i >= 0; i--) {
                if (data.levels[i].cellSize <= targetCell) {
                    best = i;
                    break;
                }
            }
            // Apply manual offset, clamped to valid range
            const final = Math.max(0, Math.min(data.levels.length - 1, best + levelOffset));
            return final;
        }

        // ---------------------------------------------------------------
        // Viewport bounds in data coordinates
        // ---------------------------------------------------------------
        function getViewport() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;
            return {
                minX: -panX / zoom,
                minY: -panY / zoom,
                maxX: (cw - panX) / zoom,
                maxY: (ch - panY) / zoom,
            };
        }

        // ---------------------------------------------------------------
        // Reference coordinate translation
        // ---------------------------------------------------------------
        function initSpine(refSpine) {
            const n = refSpine.length;
            spineX = new Float64Array(n);
            spineBp = new Float64Array(n);
            spineY = new Float64Array(n);
            spineStep = new Float64Array(n);
            for (let i = 0; i < n; i++) {
                spineX[i] = refSpine[i][0];
                spineBp[i] = refSpine[i][1];
                spineY[i] = refSpine[i][2];
                spineStep[i] = refSpine[i][3] ?? 0;
            }
        }

        function xToBp(layoutX) {
            if (!spineX || spineX.length === 0) return null;
            // Clamp to spine range
            if (layoutX <= spineX[0]) return spineBp[0];
            if (layoutX >= spineX[spineX.length - 1]) return spineBp[spineBp.length - 1];
            // Binary search for interval
            let lo = 0, hi = spineX.length - 1;
            while (lo < hi - 1) {
                const mid = (lo + hi) >> 1;
                if (spineX[mid] <= layoutX) lo = mid;
                else hi = mid;
            }
            // Linear interpolation
            const t = (layoutX - spineX[lo]) / (spineX[hi] - spineX[lo]);
            return spineBp[lo] + t * (spineBp[hi] - spineBp[lo]);
        }

        function xToY(layoutX) {
            if (!spineX || spineX.length === 0) return null;
            if (layoutX <= spineX[0]) return spineY[0];
            if (layoutX >= spineX[spineX.length - 1]) return spineY[spineY.length - 1];
            let lo = 0, hi = spineX.length - 1;
            while (lo < hi - 1) {
                const mid = (lo + hi) >> 1;
                if (spineX[mid] <= layoutX) lo = mid;
                else hi = mid;
            }
            const t = (layoutX - spineX[lo]) / (spineX[hi] - spineX[lo]);
            return spineY[lo] + t * (spineY[hi] - spineY[lo]);
        }

        function bpToStep(bp) {
            if (!spineBp || spineBp.length === 0) return 0;
            if (bp <= spineBp[0]) return spineStep[0];
            if (bp >= spineBp[spineBp.length - 1]) return spineStep[spineStep.length - 1];
            let lo = 0, hi = spineBp.length - 1;
            while (lo < hi - 1) {
                const mid = (lo + hi) >> 1;
                if (spineBp[mid] <= bp) lo = mid;
                else hi = mid;
            }
            const t = (bp - spineBp[lo]) / (spineBp[hi] - spineBp[lo]);
            return spineStep[lo] + t * (spineStep[hi] - spineStep[lo]);
        }

        function viewportStepCount() {
            const vp = getViewport();
            const bpLeft = xToBp(vp.minX);
            const bpRight = xToBp(vp.maxX);
            if (bpLeft === null || bpRight === null) return Infinity;
            return bpToStep(bpRight) - bpToStep(bpLeft);
        }

        function formatBp(bp) {
            bp = Math.round(bp);
            return bp.toLocaleString();
        }

        function bpToX(bp) {
            if (!spineBp || spineBp.length === 0) return null;
            if (bp <= spineBp[0]) return spineX[0];
            if (bp >= spineBp[spineBp.length - 1]) return spineX[spineX.length - 1];
            let lo = 0, hi = spineBp.length - 1;
            while (lo < hi - 1) {
                const mid = (lo + hi) >> 1;
                if (spineBp[mid] <= bp) lo = mid;
                else hi = mid;
            }
            const t = (bp - spineBp[lo]) / (spineBp[hi] - spineBp[lo]);
            return spineX[lo] + t * (spineX[hi] - spineX[lo]);
        }

        // ---------------------------------------------------------------
        // URL hash: sync viewport state for shareable links
        // ---------------------------------------------------------------
        function updateUrlHash() {
            if (!spineX || !chromosome) return;
            const vp = getViewport();
            const bpLeft = xToBp(vp.minX);
            const bpRight = xToBp(vp.maxX);
            if (bpLeft === null || bpRight === null) return;
            const start = Math.max(0, Math.round(bpLeft));
            const end = Math.round(bpRight);
            const hash = `#${chromosome}:${start}-${end}`;
            if (location.hash !== hash) {
                history.replaceState(null, '', hash);
            }
        }

        function scheduleHashUpdate() {
            if (hashTimer) clearTimeout(hashTimer);
            hashTimer = setTimeout(updateUrlHash, 150);
        }

        function parseUrlHash() {
            const hash = location.hash.replace(/^#/, '');
            if (!hash) return null;
            // Format: chrY:12345-67890
            const m = hash.match(/^([^:]+):(\d+)-(\d+)$/);
            if (!m) return null;
            return { chrom: m[1], start: parseInt(m[2], 10), end: parseInt(m[3], 10) };
        }

        function navigateToHash() {
            const params = parseUrlHash();
            if (!params || !spineX) return false;

            const layoutLeft = bpToX(params.start);
            const layoutRight = bpToX(params.end);
            if (layoutLeft === null || layoutRight === null) return false;

            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;

            const layoutWidth = layoutRight - layoutLeft;
            if (layoutWidth <= 0) return false;

            // Fit the bp range horizontally with padding
            const pad = 40;
            zoom = (cw - pad * 2) / layoutWidth;

            // Center on the midpoint; use spine Y for vertical centering
            const midX = (layoutLeft + layoutRight) / 2;
            const midY = xToY(midX);
            if (midY === null) return false;

            panX = (cw / 2) - (midX * zoom);
            panY = (ch / 2) - (midY * zoom);
            return true;
        }

        // ---------------------------------------------------------------
        // Gene landmarks (real chrY genes, GRCh38)
        // ---------------------------------------------------------------
        const GENES = [
            { name: 'SRY',     startBp: 2786855,  endBp: 2787682 },
            { name: 'ZFY',     startBp: 2935281,  endBp: 2982506 },
            { name: 'PCDH11Y', startBp: 5000226,  endBp: 5742224 },
            { name: 'AMELY',   startBp: 6865918,  endBp: 6911752 },
            { name: 'USP9Y',   startBp: 12537650, endBp: 12860839 },
            { name: 'UTY',     startBp: 13234577, endBp: 13480673 },
            { name: 'NLGN4Y',  startBp: 14522573, endBp: 14845654 },
            { name: 'KDM5D',   startBp: 19703865, endBp: 19744939 },
            { name: 'EIF1AY',  startBp: 20575776, endBp: 20593154 },
            { name: 'RBMY1A1', startBp: 21534879, endBp: 21549326 },
            { name: 'DAZ1',    startBp: 23129355, endBp: 23199010 },
        ];
        let genePins = [];

        function placeGenes() {
            if (!spineX || !data) return;
            genePins = [];
            for (const gene of GENES) {
                const startX = bpToX(gene.startBp);
                const endX = bpToX(gene.endBp);
                if (startX === null || endX === null) continue;
                const midX = (startX + endX) / 2;
                const yStart = xToY(startX);
                const yEnd = xToY(endX);
                const yMid = xToY(midX);
                const refY = yMid;
                const minY = Math.min(yStart, yMid, yEnd);
                const maxY = Math.max(yStart, yMid, yEnd);
                genePins.push({ name: gene.name, startX, endX, midX, refY, minY, maxY });
            }
        }

        // ---------------------------------------------------------------
        // Detail data: fetch, process, cache
        // ---------------------------------------------------------------
        function processChainsResponse(apiResponse) {
            const chains = [];
            let totalBubbles = 0;
            for (const chain of apiResponse.chains) {
                chains.push({
                    id: chain.id,
                    polyline: chain.polyline,   // [[x,y], ...]
                    length: chain.length,
                    nBubbles: chain.n_bubbles,
                    subtype: chain.subtype,
                    depth: chain.depth || 0,
                    connector: chain.connector || false,
                    sourceSegs: chain.source_segs,
                    sinkSegs: chain.sink_segs,
                });
                totalBubbles += chain.n_bubbles;
            }

            const bubbles = [];
            for (const b of (apiResponse.bubbles || [])) {
                bubbles.push({
                    id: b.id,
                    x: b.x,
                    y: b.y,
                    rx: b.rx,
                    ry: b.ry,
                    subtype: b.subtype,
                    length: b.length,
                    chain: b.chain,
                });
            }

            return { chains, bubbles, totalBubbles };
        }

        async function fetchChainsForViewport() {
            if (!spineX || !chromosome) return;

            const vp = getViewport();
            const bpLeft = xToBp(vp.minX);
            const bpRight = xToBp(vp.maxX);
            if (bpLeft === null || bpRight === null) return;

            const span = bpRight - bpLeft;
            const marginBp = span * FETCH_MARGIN;
            const fetchStart = Math.max(0, Math.round(bpLeft - marginBp));
            const fetchEnd = Math.round(bpRight + marginBp);

            // Reuse cache if viewport is within cached range and zoom hasn't changed much
            if (detailCache &&
                fetchStart >= detailCache.bpStart &&
                fetchEnd <= detailCache.bpEnd) {
                const zoomRatio = zoom / (detailCache.zoom || zoom);
                if (zoomRatio > 0.5 && zoomRatio < 2) {
                    console.log(`[detail] cache HIT: viewport ${Math.round(fetchStart/1000)}k-${Math.round(fetchEnd/1000)}k within cached ${Math.round(detailCache.bpStart/1000)}k-${Math.round(detailCache.bpEnd/1000)}k`);
                    return;
                }
                console.log(`[detail] cache STALE: zoom changed ${zoomRatio.toFixed(2)}x, re-fetching for new expand threshold`);
            }

            // Cancel any in-flight fetch
            if (fetchController) fetchController.abort();
            fetchController = new AbortController();

            // Expand bubbles whose layout span exceeds 1/10 of viewport width (in layout units)
            const vp2 = getViewport();
            const viewportLayoutWidth = vp2.maxX - vp2.minX;
            const expandThreshold = Math.round(Math.max(100, viewportLayoutWidth / 10));
            // Expose individual bubbles for chains spanning > 1/8 of viewport
            const bubbleThreshold = Math.round(Math.max(50, viewportLayoutWidth / 8));
            let url = `/chains?genome=${encodeURIComponent(GENOME)}&chromosome=${encodeURIComponent(chromosome)}&start=${fetchStart}&end=${fetchEnd}&expand=${expandThreshold}&bubble=${bubbleThreshold}`;
            console.log(`[detail] FETCH /chains: ${Math.round(fetchStart/1000)}k-${Math.round(fetchEnd/1000)}k (${Math.round((fetchEnd-fetchStart)/1000)}kb span, expand>${expandThreshold}, bubble>${bubbleThreshold} layout units)`);

            try {
                const t0 = performance.now();
                const resp = await fetch(url, { signal: fetchController.signal });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const apiData = await resp.json();

                const processed = processChainsResponse(apiData);
                const totalPts = processed.chains.reduce((s, c) => s + c.polyline.length, 0);
                console.log(`[detail]   /chains response: ${processed.chains.length} chains, ${processed.bubbles.length} exposed bubbles, ${processed.totalBubbles} chain-bubbles, ${totalPts} polyline pts (${(performance.now()-t0).toFixed(0)}ms)`);

                detailCache = { bpStart: fetchStart, bpEnd: fetchEnd, zoom, data: processed };
                detailData = processed;

                if (detailPhase === 'none') {
                    fadeStartTime = performance.now();
                    setDetailPhase('fading-in');
                    scheduleFadeFrame();
                } else if (detailPhase === 'fading-out') {
                    // Data arrived while fading out — reverse the fade
                    const remaining = detailOpacity;
                    fadeStartTime = performance.now() - remaining * FADE_DURATION;
                    setDetailPhase('fading-in');
                    scheduleFadeFrame();
                }
                scheduleFrame();
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('Detail fetch error:', err);
                }
            }
        }

        function scheduleDetailFetch() {
            if (fetchTimer) clearTimeout(fetchTimer);
            fetchTimer = setTimeout(() => {
                const steps = viewportStepCount();
                const vp = getViewport();
                const bpLeft = xToBp(vp.minX);
                const bpRight = xToBp(vp.maxX);
                const bpSpan = bpRight - bpLeft;
                console.log(`[detail] scheduleDetailFetch: steps=${Math.round(steps)}, zoom=${zoom.toFixed(2)}, viewport=${Math.round(bpSpan/1000)}kb, threshold=${NODE_BUDGET_STEPS}, phase=${detailPhase}`);
                if (steps < NODE_BUDGET_STEPS) {
                    console.log(`[detail]   -> steps < threshold, fetching chains...`);
                    fetchChainsForViewport();
                } else {
                    console.log(`[detail]   -> steps >= threshold, exiting detail mode`);
                    exitDetailMode();
                }
            }, 200);
        }

        // ---------------------------------------------------------------
        // Detail phase state machine
        // ---------------------------------------------------------------
        function setDetailPhase(phase) {
            console.log(`[phase] ${detailPhase} -> ${phase}`);
            detailPhase = phase;
            const cls = (phase === 'fading-in' || phase === 'fading-out') ? 'fading' : phase;
            detailPhaseEl.className = cls;
            detailPhase2El.className = cls;
            const labels = {
                'none': '', 'fading-in': 'CHAINS', 'fading-out': 'CHAINS',
                'static': 'CHAINS',
            };
            detailPhaseEl.textContent = labels[phase] || '';
            detailPhase2El.textContent = labels[phase] || '';

            // Show/hide detail bar
            if (phase === 'none') {
                detailBarEl.classList.remove('active');
            } else {
                detailBarEl.classList.add('active');
                updateDetailBar();
            }
        }

        function updateDetailBar() {
            if (!detailData) return;
            detailChainsEl.textContent = detailData.chains.length.toLocaleString();
            detailExposedEl.textContent = (detailData.bubbles ? detailData.bubbles.length : 0).toLocaleString();
            detailNodesEl.textContent = (detailData.totalBubbles || 0).toLocaleString();
            if (detailCache) {
                detailRangeEl.textContent = `${formatBp(detailCache.bpStart)}-${formatBp(detailCache.bpEnd)}`;
            }
            detailOpacityEl.textContent = detailOpacity.toFixed(2);
            const steps = viewportStepCount();
            detailStepsEl.textContent = isFinite(steps) ? Math.round(steps).toLocaleString() : '--';
        }

        function exitDetailMode() {
            if (detailPhase === 'none' || detailPhase === 'fading-out') return;

            // Start time-based fade-out
            fadeStartTime = performance.now();
            setDetailPhase('fading-out');
            scheduleFadeFrame();
        }

        function finishExit() {
            detailData = null;
            detailCache = null;
            detailOpacity = 0;
            skeletonOpacity = 1;
            setDetailPhase('none');
            scheduleFrame();
        }

        function updateDetailOpacity() {
            const now = performance.now();
            const elapsed = now - fadeStartTime;
            const t = Math.min(1, elapsed / FADE_DURATION);

            if (detailPhase === 'fading-in') {
                detailOpacity = t;
                skeletonOpacity = Math.max(0.1, 1 - t);

                if (t < 1) {
                    scheduleFadeFrame();
                } else {
                    // Fade-in complete — chains are static, no physics
                    detailOpacity = 1;
                    skeletonOpacity = 0.1;
                    setDetailPhase('static');
                }
            } else if (detailPhase === 'fading-out') {
                detailOpacity = 1 - t;
                skeletonOpacity = Math.max(0.1, t);

                if (t < 1) {
                    scheduleFadeFrame();
                } else {
                    finishExit();
                    return;
                }
            }
            // In 'static' or 'physics' phase, opacity stays at 1/0.1
            detailOpacityEl.textContent = detailOpacity.toFixed(2);
        }

        function scheduleFadeFrame() {
            // Drive the fade animation independent of user interaction
            requestAnimationFrame(() => {
                if (detailPhase === 'fading-in' || detailPhase === 'fading-out') {
                    updateDetailOpacity();
                    scheduleFrame();
                }
            });
        }

        // Chain polylines are static — no d3-force simulation needed.
        // ODGI layout positions are used directly.

        // ---------------------------------------------------------------
        // Render: only visible polylines & junctions + detail overlay
        // ---------------------------------------------------------------
        function draw() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;

            ctx.clearRect(0, 0, cw, ch);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, cw, ch);

            const li = selectLevel();
            const level = data.levels[li];
            if (!level) return;

            const levelChanged = li !== currentLevel;
            currentLevel = li;

            // Update detail bar readouts (steps change with pan/zoom)
            if (detailPhase !== 'none') updateDetailBar();

            const vp = getViewport();
            // Margin in data units so lines at the edge aren't clipped
            const margin = (level.cellSize || 50) * 2;
            const vpMinX = vp.minX - margin;
            const vpMinY = vp.minY - margin;
            const vpMaxX = vp.maxX + margin;
            const vpMaxY = vp.maxY + margin;

            // ===== SKELETON LAYER =====
            ctx.save();
            ctx.translate(panX, panY);
            ctx.scale(zoom, zoom);

            // --- Polylines (culled) ---
            const lineWidth = Math.max(0.5, 1.2 / zoom);
            const skelAlpha = detailData ? skeletonOpacity : 1;
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.75 * skelAlpha})`;
            ctx.lineWidth = lineWidth;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const bboxes = levelBboxes[li];
            let visiblePl = 0;

            ctx.beginPath();
            for (let i = 0; i < level.polylines.length; i++) {
                const o = i * 4;
                if (bboxes[o+2] < vpMinX || bboxes[o] > vpMaxX ||
                    bboxes[o+3] < vpMinY || bboxes[o+1] > vpMaxY) continue;

                visiblePl++;
                const pl = level.polylines[i];
                ctx.moveTo(pl[0][0], pl[0][1]);
                for (let j = 1; j < pl.length; j++) {
                    ctx.lineTo(pl[j][0], pl[j][1]);
                }
            }
            ctx.stroke();

            // --- Gene-colored polylines (overdraw) ---
            const geneYMargin = (level.cellSize || 50) * 3;
            if (genePins.length > 0) {
                ctx.strokeStyle = `rgba(232, 167, 53, ${skelAlpha})`;
                ctx.lineWidth = lineWidth * 2;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                ctx.beginPath();
                for (let i = 0; i < level.polylines.length; i++) {
                    const o = i * 4;
                    if (bboxes[o+2] < vpMinX || bboxes[o] > vpMaxX ||
                        bboxes[o+3] < vpMinY || bboxes[o+1] > vpMaxY) continue;

                    let inGene = false;
                    for (const gene of genePins) {
                        if (bboxes[o+2] >= gene.startX && bboxes[o] <= gene.endX &&
                            bboxes[o+3] >= gene.minY - geneYMargin && bboxes[o+1] <= gene.maxY + geneYMargin) {
                            inGene = true;
                            break;
                        }
                    }
                    if (!inGene) continue;

                    const pl = level.polylines[i];
                    ctx.moveTo(pl[0][0], pl[0][1]);
                    for (let j = 1; j < pl.length; j++) {
                        ctx.lineTo(pl[j][0], pl[j][1]);
                    }
                }
                ctx.stroke();
            }

            // --- Junctions (culled) ---
            const r = Math.max(1.5, 3.0 / zoom);
            ctx.fillStyle = `rgba(255, 255, 255, ${0.35 * skelAlpha})`;
            let visibleJ = 0;

            ctx.beginPath();
            for (const [x, y] of level.junctions) {
                if (x < vpMinX || x > vpMaxX || y < vpMinY || y > vpMaxY) continue;
                visibleJ++;
                ctx.moveTo(x + r, y);
                ctx.arc(x, y, r, 0, Math.PI * 2);
            }
            ctx.fill();

            // --- Gene-colored junctions (overdraw) ---
            if (genePins.length > 0) {
                const gr = Math.max(2, 4.0 / zoom);
                ctx.fillStyle = `rgba(232, 167, 53, ${skelAlpha})`;
                ctx.beginPath();
                for (const [x, y] of level.junctions) {
                    if (x < vpMinX || x > vpMaxX || y < vpMinY || y > vpMaxY) continue;
                    let inGene = false;
                    for (const gene of genePins) {
                        if (x >= gene.startX && x <= gene.endX &&
                            y >= gene.minY - geneYMargin && y <= gene.maxY + geneYMargin) {
                            inGene = true;
                            break;
                        }
                    }
                    if (!inGene) continue;
                    ctx.moveTo(x + gr, y);
                    ctx.arc(x, y, gr, 0, Math.PI * 2);
                }
                ctx.fill();
            }

            // ===== DETAIL LAYER (drawn in same data-space transform) =====
            if (detailData && detailOpacity > 0) {
                drawDetail();
            }

            ctx.restore();

            // --- Gene labels (screen coords) ---
            if (genePins.length > 0) {
                const fontSize = 11;
                ctx.font = `600 ${fontSize}px 'SF Mono', Consolas, monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';

                for (const gene of genePins) {
                    const sxStart = gene.startX * zoom + panX;
                    const sxEnd = gene.endX * zoom + panX;
                    const sxMid = (sxStart + sxEnd) / 2;
                    const syRef = gene.refY * zoom + panY;
                    if (sxEnd < -60 || sxStart > cw + 60) continue;

                    const geneW = sxEnd - sxStart;
                    const bracketY = syRef - 16;

                    ctx.strokeStyle = '#e8a735';
                    ctx.lineWidth = 1.5;
                    if (geneW > 6) {
                        ctx.beginPath();
                        ctx.moveTo(sxStart, syRef + 4);
                        ctx.lineTo(sxStart, bracketY);
                        ctx.lineTo(sxEnd, bracketY);
                        ctx.lineTo(sxEnd, syRef + 4);
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(sxMid, syRef + 4);
                        ctx.lineTo(sxMid, bracketY);
                        ctx.stroke();
                    }

                    const label = gene.name;
                    const tw = ctx.measureText(label).width;
                    const px = 5, py = 2;
                    const ly = bracketY - 4;

                    ctx.fillStyle = 'rgba(40, 32, 10, 0.85)';
                    const rr = 3;
                    const rx = sxMid - tw / 2 - px;
                    const ry = ly - fontSize - py;
                    const rw = tw + px * 2;
                    const rh = fontSize + py * 2;
                    ctx.beginPath();
                    ctx.roundRect(rx, ry, rw, rh, rr);
                    ctx.fill();

                    ctx.fillStyle = '#e8a735';
                    ctx.fillText(label, sxMid, ly);
                }
            }

            // --- Update info ---
            if (levelChanged) {
                levelLabel.textContent = level.label;
                nodeCountEl.textContent = level.nodeCount.toLocaleString();
                polylineCountEl.textContent = level.polylineCount.toLocaleString();
                const pct = ((1 - level.nodeCount / data.stats.totalSegments) * 100).toFixed(1);
                reductionEl.textContent = `${pct}%`;
            }
            visibleCountEl.textContent = `${visiblePl.toLocaleString()} / ${visibleJ.toLocaleString()}`;

            // --- Viewport coordinate readout ---
            if (spineX) {
                const bpLeft = xToBp(vp.minX);
                const bpRight = xToBp(vp.maxX);
                if (bpLeft !== null && bpRight !== null) {
                    viewportBpEl.textContent = `${chromosome}:${formatBp(bpLeft)}-${formatBp(bpRight)}`;
                }
            }
        }

        // ---------------------------------------------------------------
        // Detail rendering pass (within data-space transform)
        // ---------------------------------------------------------------
        function subtypeColor(subtype) {
            return subtype === 'simple' ? '#4a90d9'
                : subtype === 'superbubble' ? '#d94a90' : '#90d94a';
        }

        function drawChainPolylines(chains, baseWidth, hovChain) {
            for (const chain of chains) {
                const pl = chain.polyline;
                if (pl.length < 2) continue;
                const isHovered = hovChain && chain === hovChain;

                if (chain.connector) {
                    // Connector: thin dashed line for leaf-bubble runs
                    const dashLen = Math.max(4, 10 / zoom);
                    ctx.setLineDash([dashLen, dashLen]);
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = Math.max(1, baseWidth * 0.6);
                    ctx.globalAlpha = (hovChain && !isHovered ? 0.15 : 0.5) * detailOpacity;
                } else {
                    // Regular chain: solid line
                    const w = Math.max(1.5, baseWidth * Math.log2(Math.max(2, chain.nBubbles)));
                    ctx.setLineDash([]);
                    ctx.strokeStyle = '#4a90d9';
                    ctx.lineWidth = isHovered ? w * 1.5 : w;
                    if (hovChain && !isHovered) {
                        ctx.globalAlpha = 0.25 * detailOpacity;
                    } else if (isHovered) {
                        ctx.globalAlpha = detailOpacity;
                    } else {
                        ctx.globalAlpha = 0.9 * detailOpacity;
                    }
                }

                ctx.beginPath();
                ctx.moveTo(pl[0][0], pl[0][1]);
                for (let i = 1; i < pl.length; i++) {
                    ctx.lineTo(pl[i][0], pl[i][1]);
                }
                ctx.stroke();

                if (hovChain) {
                    ctx.globalAlpha = detailOpacity;
                }
            }
            ctx.setLineDash([]);
        }

        function drawBubbleEllipses(bubbles, hovBubble) {
            // Minimum radius in screen pixels so bubbles are always visible
            const minR = 4 / zoom;
            for (const b of bubbles) {
                const isHovered = hovBubble && b === hovBubble;
                const color = subtypeColor(b.subtype);

                if (hovBubble && !isHovered) {
                    ctx.globalAlpha = 0.2 * detailOpacity;
                } else if (isHovered) {
                    ctx.globalAlpha = 0.9 * detailOpacity;
                } else {
                    ctx.globalAlpha = 0.6 * detailOpacity;
                }

                const rx = Math.max(b.rx, minR);
                const ry = Math.max(b.ry, minR);

                ctx.fillStyle = color;
                ctx.strokeStyle = isHovered ? '#fff' : color;
                ctx.lineWidth = isHovered ? 2 / zoom : 1 / zoom;

                ctx.beginPath();
                ctx.ellipse(b.x, b.y, rx, ry, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawDetail() {
            ctx.globalAlpha = detailOpacity;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const hovChain = hoveredChain;
            const hovBubble = hoveredBubble;

            // --- Chain polylines ---
            drawChainPolylines(detailData.chains, Math.max(1.5, 3 / zoom), hovChain);

            // --- Exposed bubbles ---
            if (detailData.bubbles && detailData.bubbles.length > 0) {
                drawBubbleEllipses(detailData.bubbles, hovBubble);
            }

            // --- Hover highlight ---
            if (hoveredChain) {
                const hc = hoveredChain;
                const pl = hc.polyline;

                // Highlight hovered chain with bright stroke
                if (pl.length >= 2) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = Math.max(2.5, 5 / zoom);
                    ctx.globalAlpha = 0.3 * detailOpacity;
                    ctx.beginPath();
                    ctx.moveTo(pl[0][0], pl[0][1]);
                    for (let i = 1; i < pl.length; i++) {
                        ctx.lineTo(pl[i][0], pl[i][1]);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = detailOpacity;
                }
            }

            if (hoveredBubble) {
                const b = hoveredBubble;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = Math.max(2, 3 / zoom);
                ctx.globalAlpha = 0.5 * detailOpacity;
                ctx.beginPath();
                ctx.ellipse(b.x, b.y, b.rx, b.ry, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = detailOpacity;
            }

            ctx.globalAlpha = 1;
        }

        // ---------------------------------------------------------------
        // RAF-throttled frame scheduling
        // ---------------------------------------------------------------
        function scheduleFrame() {
            if (rafId) return;
            rafId = requestAnimationFrame(() => {
                rafId = null;
                draw();
            });
        }

        // --- Pan & zoom ---
        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            dragStartX = e.clientX - panX;
            dragStartY = e.clientY - panY;
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            panX = e.clientX - dragStartX;
            panY = e.clientY - dragStartY;
            scheduleFrame();
            scheduleDetailFetch();
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            canvas.style.cursor = 'grab';
            scheduleHashUpdate();
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            const newZoom = zoom * factor;

            panX = mx - (mx - panX) * (newZoom / zoom);
            panY = my - (my - panY) * (newZoom / zoom);
            zoom = newZoom;
            scheduleFrame();
            scheduleDetailFetch();
            scheduleHashUpdate();
        }, { passive: false });

        // --- Hover state ---
        let hoveredChain = null;   // chain object or null
        let hoveredBubble = null;  // bubble object or null
        const tooltipEl = document.getElementById('tooltip');
        const HIT_RADIUS_PX = 12;  // screen pixels for hit detection

        function pointToSegmentDist(px, py, ax, ay, bx, by) {
            const dx = bx - ax, dy = by - ay;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return Math.hypot(px - ax, py - ay);
            const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
            return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
        }

        function hitTestBubbles(dataX, dataY) {
            if (!detailData || !detailData.bubbles || detailOpacity < 0.5) return null;
            const margin = HIT_RADIUS_PX / zoom;
            for (const b of detailData.bubbles) {
                // Ellipse containment with hover margin
                const dx = (dataX - b.x) / (b.rx + margin);
                const dy = (dataY - b.y) / (b.ry + margin);
                if (dx * dx + dy * dy <= 1) return b;
            }
            return null;
        }

        function hitTestChains(dataX, dataY) {
            if (!detailData || detailOpacity < 0.5) return null;
            const hitR = HIT_RADIUS_PX / zoom;
            let bestDist = hitR;
            let bestChain = null;

            for (const chain of detailData.chains) {
                const pl = chain.polyline;
                for (let i = 0; i < pl.length - 1; i++) {
                    const d = pointToSegmentDist(dataX, dataY, pl[i][0], pl[i][1], pl[i+1][0], pl[i+1][1]);
                    if (d < bestDist) {
                        bestDist = d;
                        bestChain = chain;
                    }
                }
            }
            return bestChain;
        }

        function formatTooltip(chain) {
            const subtypeColors = { simple: '#4a90d9', superbubble: '#d94a90' };
            const color = subtypeColors[chain.subtype] || '#90d94a';
            const lengthStr = chain.length >= 1000 ? (chain.length/1000).toFixed(1) + 'kb' : chain.length + 'bp';
            const typeLabel = `<span class="tt-subtype" style="color:${color}">${chain.subtype}</span>`;
            const lines = [
                `<span class="tt-label">chain</span> <span class="tt-chain">${chain.id}</span>`,
                `<span class="tt-label">type</span> ${typeLabel}`,
                `<span class="tt-label">length</span> <span class="tt-val">${lengthStr}</span>`,
                `<span class="tt-label">bubbles</span> <span class="tt-val">${chain.nBubbles}</span>`,
                `<span class="tt-label">polyline</span> <span class="tt-val">${chain.polyline.length} pts</span>`,
                `<span class="tt-label">depth</span> <span class="tt-val">${chain.depth}</span>`,
            ];
            return lines.join('<br>');
        }

        function formatBubbleTooltip(b) {
            const color = subtypeColor(b.subtype);
            const lengthStr = b.length >= 1000 ? (b.length/1000).toFixed(1) + 'kb' : b.length + 'bp';
            const typeLabel = `<span class="tt-subtype" style="color:${color}">${b.subtype}</span>`;
            const lines = [
                `<span class="tt-label">bubble</span> <span class="tt-chain">${b.id}</span>`,
                `<span class="tt-label">type</span> ${typeLabel}`,
                `<span class="tt-label">length</span> <span class="tt-val">${lengthStr}</span>`,
                `<span class="tt-label">chain</span> <span class="tt-val">${b.chain}</span>`,
            ];
            return lines.join('<br>');
        }

        // --- Cursor coordinate readout + hover hit-test ---
        canvas.addEventListener('mousemove', e => {
            if (isDragging || !spineX) return;
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const layoutX = (screenX - panX) / zoom;
            const layoutY = (screenY - panY) / zoom;
            const bp = xToBp(layoutX);
            if (bp !== null) {
                cursorBpEl.textContent = `${chromosome}:${formatBp(bp)}`;
            }

            // Hit-test bubbles first (rendered on top), then chains
            const hitBubble = hitTestBubbles(layoutX, layoutY);
            const hitChain = hitBubble ? null : hitTestChains(layoutX, layoutY);
            const hit = hitBubble || hitChain;

            if (hit) {
                hoveredBubble = hitBubble;
                hoveredChain = hitChain;
                tooltipEl.innerHTML = hitBubble ? formatBubbleTooltip(hitBubble) : formatTooltip(hitChain);
                tooltipEl.style.display = 'block';
                // Position tooltip near cursor, offset right and up
                const ttRect = tooltipEl.getBoundingClientRect();
                let tx = e.clientX + 14;
                let ty = e.clientY - ttRect.height - 8;
                // Keep on screen
                if (tx + ttRect.width > window.innerWidth - 8) tx = e.clientX - ttRect.width - 14;
                if (ty < 4) ty = e.clientY + 18;
                tooltipEl.style.left = tx + 'px';
                tooltipEl.style.top = ty + 'px';
                canvas.style.cursor = 'crosshair';
                scheduleFrame();
            } else if (hoveredChain || hoveredBubble) {
                hoveredChain = null;
                hoveredBubble = null;
                tooltipEl.style.display = 'none';
                canvas.style.cursor = 'grab';
                scheduleFrame();
            }
        });

        canvas.addEventListener('mouseleave', () => {
            cursorBpEl.textContent = '';
            if (hoveredChain || hoveredBubble) {
                hoveredChain = null;
                hoveredBubble = null;
                tooltipEl.style.display = 'none';
                canvas.style.cursor = 'grab';
                scheduleFrame();
            }
        });

        // --- Double-click to reset view ---
        canvas.addEventListener('dblclick', () => {
            fitToScreen();
            scheduleFrame();
            scheduleDetailFetch();
            scheduleHashUpdate();
        });

        // --- LOD override buttons ---
        document.getElementById('lod-finer').addEventListener('click', () => {
            levelOffset--;
            updateLodDisplay();
            scheduleFrame();
        });
        document.getElementById('lod-coarser').addEventListener('click', () => {
            levelOffset++;
            updateLodDisplay();
            scheduleFrame();
        });
        // Double-click offset label to reset to auto
        lodOffsetEl.addEventListener('dblclick', () => {
            levelOffset = 0;
            updateLodDisplay();
            scheduleFrame();
        });

        function updateLodDisplay() {
            if (levelOffset === 0) {
                lodOffsetEl.textContent = 'AUTO';
                lodOffsetEl.style.color = '#0ff';
            } else {
                const sign = levelOffset > 0 ? '+' : '';
                lodOffsetEl.textContent = `${sign}${levelOffset}`;
                lodOffsetEl.style.color = '#ff0';
            }
        }

        // --- Load data ---
        async function init() {
            try {
                const resp = await fetch('/simplify-data');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                data = await resp.json();
            } catch (err) {
                loadingEl.textContent = `Error loading data: ${err.message}`;
                return;
            }

            loadingEl.style.display = 'none';

            statsEl.textContent =
                `${data.stats.totalSegments.toLocaleString()} segs | ` +
                `${data.stats.junctionCount.toLocaleString()} junctions | ` +
                `${data.levels.length} grid levels`;

            precomputeBboxes();
            computeBounds();

            // Initialize reference spine if available
            if (data.refSpine) {
                initSpine(data.refSpine);
                chromosome = data.chromosome || '';
                placeGenes();
            }
            resizeCanvas();

            // Navigate to URL hash coordinates, or fit whole graph
            if (!navigateToHash()) {
                fitToScreen();
            }
            scheduleFrame();
            scheduleDetailFetch();
            scheduleHashUpdate();
        }

        window.addEventListener('resize', resizeCanvas);
        init();
    </script>
</body>
</html>
