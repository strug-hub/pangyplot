<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Graph Simplification Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #controls {
            padding: 10px 20px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
            z-index: 10;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        #controls span.val {
            color: #fff;
            font-weight: 600;
        }

        #stats {
            margin-left: auto;
            color: #555;
            font-size: 12px;
        }

        #grid-meter {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        #grid-meter .bar {
            width: 6px;
            height: 14px;
            background: #333;
            border-radius: 1px;
            transition: background 0.15s;
        }
        #grid-meter .bar.active {
            background: #0ff;
        }

        #canvas-container {
            flex: 1;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #666;
        }

        #detail-phase {
            font-size: 11px;
            font-family: 'SF Mono', Consolas, monospace;
        }
        #detail-phase.none { color: #555; }
        #detail-phase.fading { color: #f90; }
        #detail-phase.static { color: #0f0; }

        #detail-bar {
            padding: 4px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
            z-index: 10;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            color: #888;
            visibility: hidden;
        }
        #detail-bar.active { visibility: visible; }
        #detail-bar span.val { color: #5bb8f0; font-weight: 600; }

        #tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(20, 20, 20, 0.92);
            border: 1px solid #444;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 11px;
            font-family: 'SF Mono', Consolas, monospace;
            color: #ccc;
            white-space: nowrap;
            display: none;
            z-index: 20;
            line-height: 1.5;
        }
        #tooltip .tt-label { color: #888; }
        #tooltip .tt-val { color: #fff; font-weight: 600; }
        #tooltip .tt-chain { color: #5bb8f0; }
        #tooltip .tt-subtype { font-weight: 600; }
    </style>
</head>
<body>
    <div id="controls">
        <span id="level-label" class="val">--</span>
        <span><span id="node-count" class="val">--</span> nodes</span>
        <span><span id="polyline-count" class="val">--</span> lines</span>
        <span><span id="visible-count" class="val">--</span> visible</span>
        <span><span id="reduction" class="val">--</span> reduction</span>
        <div id="grid-meter"></div>
        <span style="color: #888; font-size: 12px;">zoom <span id="zoom-val" class="val" style="color: #0ff;">1.0</span></span>
        <span id="viewport-bp" style="color: #4f4; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px;"></span>
        <span id="cursor-bp" style="color: #999; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px;"></span>
        <span id="detail-phase" class="none"></span>
        <span id="stats"></span>
    </div>
    <div id="detail-bar">
        <span id="detail-phase2" class="none"></span>
        <span><span id="detail-chains" class="val">--</span> details</span>
        <span><span id="detail-exposed" class="val">--</span> exposed</span>
        <span><span id="detail-nodes" class="val">--</span> bubbles</span>
        <span><span id="detail-range" class="val">--</span></span>
        <span>opacity <span id="detail-opacity" class="val">0</span></span>
        <span>steps <span id="detail-steps" class="val">--</span></span>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="loading">Loading graph data...</div>
        <div id="tooltip"></div>
    </div>

    <script src="/static/js/d3/d3.js"></script>
    <script>
        window.__SIMPLIFY_CONFIG = { genome: '{{ genome }}' };
    </script>
    <script type="module" src="{{ url_for('static', filename='js/simplify/simplify-app.js') }}"></script>
</body>
</html>
