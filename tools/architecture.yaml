# Authored intent layer. This is the ONLY hand-maintained part of the architecture map --
# everything else (edges, public surface, LOC) is regenerated by tools/architecture.py.
#
# `layer` places the module in the dependency stack. `rank` is the layer's depth: a module
# should only import from its own rank or a LOWER one. Violations are reported, not hidden.
#
# layers:  cli(6) app(5) query(4) index(3) storage(2) domain(1) shared(0)
#          preprocess(5) | viewer-entry(5) viewer-engines(4) viewer-detail(3)
#          viewer-skeleton(3) viewer-core(2) ui-sections(3) ui-kit(1) debug(9)

# ---------------------------------------------------------------- backend
pangyplot:
  layer: app
  intent: "Flask entry point. app.py builds the app and loads every chromosome index into memory at startup; routes.py is the whole HTTP surface and delegates to db/query. organisms.py holds the assembly/cytoband config."
pangyplot/commands:
  layer: cli
  intent: "The `pangyplot <verb>` subcommands -- run, add, annotate, reindex, status. The only place that orchestrates preprocessing end to end; nothing imports it."
pangyplot/db:
  layer: query
  intent: "Query orchestration. query.py turns a genomic region into nodes+links by walking the indexes; path_codec.py handles the compressed .binpath format. Routes talk to this, never to sqlite directly."
pangyplot/db/indexes:
  layer: index
  intent: "In-memory typed-array indexes loaded at startup from *.quickindex.json.gz caches. Sorted arrays for coordinate->segment lookup; the hot path for every request."
pangyplot/db/sqlite:
  layer: storage
  intent: "One module per table -- segments, links, paths, steps, bubbles, annotations. Owns all SQL. The indexes read through this; nothing above the index layer should."
pangyplot/objects:
  layer: domain
  intent: "Plain domain records -- Bubble, Chain, Segment, Link, Path, Annotation. No I/O, no dependencies. The vocabulary everything else is written in."
pangyplot/utils:
  layer: shared
  intent: "Leaf helpers with no project dependencies."
pangyplot/preprocess:
  layer: preprocess
  intent: "Shared preprocessing scaffolding -- run metadata, logging, path setup. The bubble/parser/skeleton/spine stages hang off this."
pangyplot/preprocess/parser:
  layer: preprocess
  intent: "Reads the input formats: GFA, odgi layout TSV, GFF3, cytoband. Writes straight into the sqlite tables."
pangyplot/preprocess/parser/gfa:
  layer: preprocess
  intent: "The GFA line parsers proper -- segments, links, paths -- split out because GFA parsing is the hot loop of ingest."
pangyplot/preprocess/bubble:
  layer: preprocess
  intent: "Superbubble detection. Two backends behind PANGYPLOT_FLAT_BUBBLES: the flat int-array pipeline (default, ~half the peak RSS) and the vendored BubbleGun. Both emit a byte-identical bubbles.db."
pangyplot/preprocess/skeleton:
  layer: preprocess
  intent: "Precomputes the low-resolution skeleton and polychain geometry the viewer loads before any detail tiles."
pangyplot/preprocess/spine:
  layer: preprocess
  intent: "Builds the reference spine -- the linear backbone the skeleton is laid out against."

# ---------------------------------------------------------------- frontend: shared
pangyplot/static/js:
  layer: shared
  intent: "event-bus.js and app-state.js. Aliased as @event-bus / @app-state in the import map and reachable from every module -- the one intentional global."
pangyplot/static/js/utils:
  layer: shared
  intent: "Pure helpers -- color and number formatting. Leaf, no imports."
pangyplot/static/js/ui/elements:
  layer: ui-kit
  intent: "Primitive widgets: button, modal, slider, toast, tooltip, search-dropdown. Leaf -- imports nothing."
pangyplot/static/js/ui/components:
  layer: ui-kit
  intent: "Widgets composed from elements: button-group, tab-set, slider-set, selectable-table."
pangyplot/static/js/ui/sections:
  layer: ui-sections
  intent: "The page chrome around the canvas -- navbar, gene search, coordinates, color picker, locale, db selection. Loaded directly by <script type=module> in the templates; talks to the viewer only through the event bus."
pangyplot/static/js/ui/sections/tabs:
  layer: ui-sections
  intent: "The tab panels in the sidebar."
pangyplot/static/js/ui/sections/cytoband:
  layer: ui-sections
  intent: "Ideogram entry point."
pangyplot/static/js/ui/sections/cytoband/chromosome:
  layer: ui-sections
  intent: "Single-chromosome ideogram with the draggable viewport window."
pangyplot/static/js/ui/sections/cytoband/genome:
  layer: ui-sections
  intent: "Whole-genome ideogram strip."

# ---------------------------------------------------------------- frontend: viewer
pangyplot/static/js/graph:
  layer: viewer-entry
  intent: "The viewer's composition root. app.js boots it, state.js holds view state, render-manager.js owns the frame loop and decides skeleton vs detail. Imports nearly everything -- that is its job -- so ignore its fan-out."
pangyplot/static/js/graph/data:
  layer: viewer-core
  intent: "Fetch layer. Turns /select, /skeleton, /genes responses into records, and holds view-state link resolution -- the backend sends pure GFA s->s links, this resolves them to visual endpoints."
pangyplot/static/js/graph/render:
  layer: viewer-core
  intent: "Shared canvas plumbing: viewport transform, painter utilities, render offset, SVG/PNG export."
pangyplot/static/js/graph/utils:
  layer: shared
  intent: "geometry.js and frame-scheduler.js. Leaf, imported by 16 modules -- the most depended-on frontend module."
pangyplot/static/js/graph/color:
  layer: viewer-core
  intent: "Color-by-sample / by-annotation mapping and its state."
pangyplot/static/js/graph/color/legend:
  layer: viewer-core
  intent: "The on-canvas color legend."
pangyplot/static/js/graph/skeleton/data:
  layer: viewer-skeleton
  intent: "Skeleton-side data: the precomputed low-res polylines."
pangyplot/static/js/graph/skeleton/render:
  layer: viewer-skeleton
  intent: "Draws the skeleton view -- base polylines, hover overlay, gene labels and gene polylines."
pangyplot/static/js/graph/skeleton/engines:
  layer: viewer-skeleton
  intent: "Skeleton hover hit-testing."
pangyplot/static/js/graph/detail/model:
  layer: viewer-detail
  intent: "The SimObject model -- the heart of the detail view. sim-object.js is the base; BubbleObject / SegmentObject / PolychainContainer are the hierarchy; pop-handler.js runs the pop/unpop lifecycle; segment-registry.js is the id->object map."
pangyplot/static/js/graph/detail/data:
  layer: viewer-detail
  intent: "Detail-side data: the pop tree, bubble metadata cache, polychain cache, detail view state."
pangyplot/static/js/graph/detail/data/polychain:
  layer: viewer-detail
  intent: "Fetches and adapts polychain payloads into the SimObject model."
pangyplot/static/js/graph/detail/engines:
  layer: viewer-detail
  intent: "The D3 force simulation driver and node hover for the detail view."
pangyplot/static/js/graph/detail/engines/forces:
  layer: viewer-detail
  intent: "The individual forces -- layout, viewport, anchor-gap, chain-guide, polychain -- plus their tunable settings."
pangyplot/static/js/graph/detail/engines/polychain:
  layer: viewer-detail
  intent: "Polychain-specific force and hover engines."
pangyplot/static/js/graph/detail/render:
  layer: viewer-detail
  intent: "Paints the detail view: nodes, links, highlights."
pangyplot/static/js/graph/detail/render/polychain:
  layer: viewer-detail
  intent: "Paints polychains."
pangyplot/static/js/graph/detail:
  layer: viewer-detail
  intent: "force-defaults.js -- the default force constants, kept at the top of the detail tree so both engines and UI can read them."
pangyplot/static/js/graph/engines:
  layer: viewer-engines
  intent: "Interaction engines, coordinated by engine-manager.js: LOD (skeleton<->detail switching), detail transition, keyboard, context menu, node search, reference spine, annotation label drag."
pangyplot/static/js/graph/engines/drag:
  layer: viewer-engines
  intent: "Node and chain dragging, the centroid anchor, and the (currently disabled) drag-influence system."
pangyplot/static/js/graph/engines/navigation:
  layer: viewer-engines
  intent: "Pan/zoom and URL-hash navigation."
pangyplot/static/js/graph/engines/selection:
  layer: viewer-engines
  intent: "Hover, multi-select, and the selection popup."
pangyplot/static/js/graph/engines/path-trace:
  layer: viewer-engines
  intent: "Haplotype path tracing: decodes the compressed .binpath payload, resolves it onto the current view, renders and animates the traced path."
pangyplot/static/js/graph/ui:
  layer: viewer-engines
  intent: "The bridge between viewer internals and page chrome -- tooltips, loading state, render/force settings panels, viewport sync, cursor badge."
pangyplot/static/js/graph/debug:
  layer: debug
  intent: "Debug HUD and status bar. Reaches into everything on purpose; excluded from layering checks."
pangyplot/static/js/graph/debug/views:
  layer: debug
  intent: "Debug overlays -- force vectors, gap pressure, hit zones, skeleton grid."
