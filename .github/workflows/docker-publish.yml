name: Publish container to GHCR

# Builds the PangyPlot image (CPU + GPU odgi) and pushes it to the GitHub
# Container Registry so it can be pulled as ghcr.io/scottmastro/pangyplot.
# Runs when a GitHub Release is published or a v* tag is pushed.

on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the image, e.g. 0.2.0 (publishes :0.2.0, :v0.2.0, :latest)"
        required: true
        default: "0.2.0"

env:
  IMAGE: ghcr.io/strug-hub/pangyplot   # GHCR requires a lowercase path; matches the repo owner

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      # The GPU image (CUDA base + odgi source build) is large; the default
      # runner only has ~14 GB free, so reclaim space first.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short
            # Manual runs: tag with the version you type (both 0.2.0 and v0.2.0)
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=v${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via the GitHub Actions cache to speed up re-runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
