name: Publish container to GHCR

# Builds BOTH PangyPlot images and pushes them to the GitHub Container Registry:
#   ghcr.io/strug-hub/pangyplot:<ver>       CPU image  (small, runs anywhere)
#   ghcr.io/strug-hub/pangyplot:<ver>-gpu   GPU image  (CUDA + odgi_gpu)
# Moving tags: :latest -> newest CPU, :gpu -> newest GPU.
# Runs on a published Release, a v* tag, or a manual dispatch (with a version).

on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the images, e.g. 0.2.0 (publishes :0.2.0 and :0.2.0-gpu)"
        required: true
        default: "0.2.0"

env:
  IMAGE: ghcr.io/strug-hub/pangyplot   # GHCR requires a lowercase path; matches the repo owner

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # a CPU failure shouldn't cancel the GPU build (or vice versa)
      matrix:
        include:
          - name: cpu
            dockerfile: docker/Dockerfile
            suffix: ""
            moving: latest
          - name: gpu
            dockerfile: docker/Dockerfile.gpu
            suffix: "-gpu"
            moving: gpu
    steps:
      - name: Check out
        uses: actions/checkout@v4

      # The GPU image (CUDA base + odgi source build) is large; the default
      # runner only has ~14 GB free, so reclaim space first.
      - name: Free up runner disk space
        if: matrix.name == 'gpu'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.suffix }}
            type=sha,format=short,suffix=${{ matrix.suffix }}
            # Moving pointer: :latest for CPU, :gpu for GPU
            type=raw,value=${{ matrix.moving }}
            # Manual runs: tag with the version you type (e.g. 0.2.0 / 0.2.0-gpu, v0.2.0 / v0.2.0-gpu)
            type=raw,value=${{ inputs.version }}${{ matrix.suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=v${{ inputs.version }}${{ matrix.suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via the GitHub Actions cache, kept separate per variant.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
